# ────────────────────────────────────────────────
# Predelix — Cloud Build CI/CD Pipeline
# Builds and deploys backend to Cloud Run
# ────────────────────────────────────────────────
steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/predelix-api:$SHORT_SHA', '-t', 'gcr.io/$PROJECT_ID/predelix-api:latest', './backend']

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/predelix-api:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/predelix-api:latest']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'predelix-api'
      - '--image=gcr.io/$PROJECT_ID/predelix-api:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=NODE_ENV=production,GCP_PROJECT_ID=$PROJECT_ID'

images:
  - 'gcr.io/$PROJECT_ID/predelix-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/predelix-api:latest'

timeout: '1200s'
