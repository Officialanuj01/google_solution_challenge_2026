name: Tests

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  # ── Backend: Jest unit + integration tests ──────────────────────────────
  backend-tests:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET: test-access-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          ALLOW_DEMO_WITHOUT_DB: "true"

  # ── Frontend: Vitest unit tests ─────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-side

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client-side/package.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
        env:
          VITE_API_URL: http://localhost:5001/api
          VITE_GOOGLE_CLIENT_ID: test-client-id.apps.googleusercontent.com
