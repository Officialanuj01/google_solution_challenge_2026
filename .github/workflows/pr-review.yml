name: PR Quality and Compliance Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  pr-checks:
    name: Compliance & SAST Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. PR Title Check (Required)
      - name: PR Title Check
        id: title_check
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Check if PR title follows conventional commits guidelines
          REGEXP="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .{1,100}$"
          if [[ ! "$PR_TITLE" =~ $REGEXP ]]; then
            echo "Error: PR title '$PR_TITLE' does not match Conventional Commits format."
            echo "Example: 'feat: add authentication' or 'fix(api): resolve token expiration'"
            exit 1
          fi
          echo "PR Title matches conventional commit guidelines."

      # 2. SDLC Check (Required)
      - name: SDLC Compliance Check
        id: sdlc_check
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ] || [ ${#PR_BODY} -lt 15 ]; then
            echo "Error: PR body/description is empty or too short. Please provide clear SDLC context."
            exit 1
          fi
          echo "SDLC check passed: Description has adequate length."

      # 3. SAST Security Check (Optional - continue-on-error: true)
      - name: Backend Security Audit
        continue-on-error: true
        run: |
          cd backend
          npm audit --audit-level=high

      # 4. SAST Security Check (Optional - continue-on-error: true)
      - name: Client-side Security Audit
        continue-on-error: true
        run: |
          cd client-side
          npm audit --audit-level=high

      # 5. SAST Check with CodeQL (Optional - continue-on-error: true)
      - name: Initialize CodeQL
        continue-on-error: true
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        continue-on-error: true
        uses: github/codeql-action/analyze@v3

      # 6. Request PR Review from Approver (Required)
      - name: Request PR Review from Approver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_CREATOR="${{ github.event.pull_request.user.login }}"
          if [ "$PR_CREATOR" != "Officialanuj01" ]; then
            gh pr edit ${{ github.event.pull_request.number }} --add-reviewer "Officialanuj01"
          else
            echo "PR was created by Officialanuj01. Skipping self-review request."
          fi

