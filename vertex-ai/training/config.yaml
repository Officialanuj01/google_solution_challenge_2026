# Vertex AI Training Configuration
trainingConfig:
  machineType: n1-standard-4
  acceleratorType: null
  acceleratorCount: 0
  containerUri: gcr.io/cloud-aiplatform/training/scikit-learn-cpu.1-3:latest
  
  # Training script
  pythonModule: training.train_demand_model
  
  # Input/Output
  args:
    - --training-data-source=bigquery
    
  # Environment
  env:
    GCP_PROJECT_ID: predelix-prod
    BIGQUERY_DATASET: predelix
    
  # Model output
  modelDisplayName: predelix-demand-predictor
  modelDescription: Random Forest demand prediction model for retail inventory optimization

# Vertex AI Endpoint Configuration
endpointConfig:
  displayName: predelix-prediction-endpoint
  dedicatedResources:
    machineSpec:
      machineType: n1-standard-2
    minReplicaCount: 1
    maxReplicaCount: 3
    
# Monitoring
monitoringConfig:
  enablePredictionLogging: true
  predictionSamplingRate: 0.1
